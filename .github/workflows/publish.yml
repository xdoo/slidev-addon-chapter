name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use the declared npm version
        run: npm install --global npm@11.17.0

      - name: Install locked dependencies
        run: npm ci

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          package_version="$(npm pkg get version | tr -d '"')"
          expected_tag="v${package_version}"

          if [ "$RELEASE_TAG" != "$expected_tag" ]; then
            echo "::error title=Release tag mismatch::GitHub Release tag '$RELEASE_TAG' does not match package.json version '$package_version'; expected '$expected_tag'." >&2
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Build the playground
        run: npm run build

      - name: Verify the packed package in a clean consumer
        run: npm run verify:fixture

      - name: Inspect the package contents
        run: npm pack --dry-run

      - name: Publish with provenance
        run: npm publish --access public --provenance
