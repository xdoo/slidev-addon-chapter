name: Publish to npm

on:
  release:
    types: [published]

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use the declared npm version
        run: npm install --global npm@11.17.0

      - name: Install locked dependencies
        run: npm ci

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          package_version="$(npm pkg get version | tr -d '"')"
          expected_tag="v${package_version}"

          if [ "$RELEASE_TAG" != "$expected_tag" ]; then
            echo "::error title=Release tag mismatch::GitHub Release tag '$RELEASE_TAG' does not match package.json version '$package_version'; expected '$expected_tag'." >&2
            exit 1
          fi

      - name: Reject an already published npm version
        run: |
          package_name="$(npm pkg get name | tr -d '"')"
          package_version="$(npm pkg get version | tr -d '"')"
          set +e
          registry_result="$(npm view "${package_name}@${package_version}" version --json --registry=https://registry.npmjs.org 2>&1)"
          registry_status=$?
          set -e

          if [ "$registry_status" -eq 0 ]; then
            echo "::error title=npm version already exists::${package_name}@${package_version} is already present on https://registry.npmjs.org; refusing to publish it again." >&2
            exit 1
          fi

          if printf '%s' "$registry_result" | grep -Eq 'E404|404 Not Found|404 \("'; then
            echo "No existing registry version found for ${package_name}@${package_version}; continuing."
            exit 0
          fi

          echo "::error title=Unable to verify npm version::Could not determine whether ${package_name}@${package_version} exists on https://registry.npmjs.org." >&2
          printf '%s\n' "$registry_result" >&2
          exit 1

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Build the playground
        run: npm run build

      - name: Verify the packed package in a clean consumer
        run: npm run verify:fixture

      - name: Inspect the package contents
        run: npm pack --dry-run

      - name: Publish with provenance
        run: npm publish --access public --provenance
